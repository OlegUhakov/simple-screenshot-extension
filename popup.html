<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 220px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 12px;
      background: #1a1a2e;
      color: #eee;
    }
    .title {
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 12px;
      color: #e0e0e0;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background: #0f3460; color: #fff; }
    .btn-primary:hover { background: #1a5276; }
    .btn-success { background: #1a6b3c; color: #fff; }
    .btn-success:hover { background: #248a4e; }
    .timer-group {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .timer-group select {
      flex: 1;
      padding: 6px;
      border-radius: 4px;
      border: 1px solid #333;
      background: #16213e;
      color: #eee;
      font-size: 12px;
    }
    .divider { height: 1px; background: #333; margin: 8px 0; }
  </style>
</head>
<body>
  <div class="title">Screenshot Tool</div>
  <button class="btn btn-primary" id="selectArea">Select Area</button>
  <button class="btn btn-success" id="fullScreen">Full Screen</button>
  <div class="divider"></div>
  <div class="timer-group">
    <span>Timer:</span>
    <select id="timerSelect">
      <option value="0">0 sec</option>
      <option value="3">3 sec</option>
      <option value="5">5 sec</option>
      <option value="15">15 sec</option>
    </select>
  </div>
  <script src="popup.js"></script>
</body>
</html>
